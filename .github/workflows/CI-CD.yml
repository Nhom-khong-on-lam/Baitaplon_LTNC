name: Java Develop CI Pipeline

# =====================================================================
# 1. ĐIỀU KIỆN KÍCH HOẠT: Chỉ chạy trên nhánh develop
# =====================================================================
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  # =====================================================================
  # JOB: TỰ ĐỘNG BUILD TRÊN DEVELOP
  # =====================================================================
  java-ci-develop:
    name: Java Build & Test (Develop)
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn từ nhánh develop
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Bước 3: Biên dịch toàn bộ code (Bỏ qua chạy test để né lỗi Mockito)
      - name: Run Automated Tests
        run: mvn clean compile

      # Bước 4: Build thử dự án ra file JAR để check xem có lỗi đóng gói không
      - name: Build Application (Verify Compilation)
        run: mvn package -DskipTests