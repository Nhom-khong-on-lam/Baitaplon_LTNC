name: Java Develop CI Pipeline

# =====================================================================
# 1. ĐIỀU KIỆN KÍCH HOẠT: Chỉ chạy trên nhánh develop
# =====================================================================
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  # =====================================================================
  # JOB: TỰ ĐỘNG BUILD & TEST TRÊN DEVELOP
  # =====================================================================
  java-ci-develop:
    name: Java Build & Test (Develop)
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy mã nguồn từ nhánh develop
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt JDK (Thay '17' bằng phiên bản Java của bạn: 11, 21...)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Giúp lưu lại các thư viện đã tải, những lần push sau sẽ build rất nhanh

      # Bước 3: Chạy các bài Test tự động (Unit test)
      # Hệ thống sẽ quét toàn bộ dự án để chạy test, đảm bảo code mới không làm lỗi tính năng cũ
      - name: Run Automated Tests
        run: mvn clean test

      # Bước 4: Build thử dự án ra file JAR để check xem có lỗi biên dịch (compile) không
      - name: Build Application (Verify Compilation)
        run: mvn package -DskipTests